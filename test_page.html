<script>
// =============================
// Team click highlight with 10 colors
// =============================
const highlightClasses = [
    "team-highlight-1","team-highlight-2","team-highlight-3","team-highlight-4",
    "team-highlight-5","team-highlight-6","team-highlight-7","team-highlight-8",
    "team-highlight-9","team-highlight-10"
];

document.querySelectorAll(".team-logo").forEach(logo => {
    logo.addEventListener("click", () => {
        const team = logo.dataset.team;
        const teamElements = Array.from(document.querySelectorAll(`.team-logo[data-team="${team}"]`));

        // check if any instance is already highlighted
        const current = teamElements.find(el => highlightClasses.some(c => el.classList.contains(c)));

        if(current){
            // remove highlight from all instances
            teamElements.forEach(el => highlightClasses.forEach(c => el.classList.remove(c)));
        } else {
            // find first available color globally
            const usedColors = Array.from(document.querySelectorAll(".team-logo"))
                .flatMap(el => highlightClasses.filter(c => el.classList.contains(c)));
            const availableColor = highlightClasses.find(c => !usedColors.includes(c));
            if(availableColor){
                teamElements.forEach(el => el.classList.add(availableColor));
            }
        }
    });
});
</script>
